<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Hola Mundo</title>
</head>
<body>
  <h1>Hola Mundo</h1>
  <p id="api"></p>
  <script>
    fetch('/api/saludo')
      .then(r => r.json())
      .then(d => document.getElementById('api').textContent = d.mensaje)
  </script>
</body>
</html>
